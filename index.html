<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DONY BURGUERS SUPREME - REVISADO JDP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --gold-18k: linear-gradient(145deg, #bf953f 0%, #fcf6ba 20%, #b38728 40%, #fcf6ba 60%, #aa771c 80%, #fcf6ba 100%);
            --gold-solid: #d4af37;
        }
        body { background: #000; color: var(--gold-solid); font-family: 'Arial Black', sans-serif; margin: 0; padding: 110px 3% 130px 3%; overflow-x: hidden; }
        
        .header { position: fixed; top: 0; left: 0; right: 0; height: 95px; background: #000; border-bottom: 3px solid var(--gold-solid); z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; }
        #total-venda { font-size: 28px; font-weight: 900; background: var(--gold-18k); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: #050505; border: 1px solid #1a1a1a; border-radius: 12px; overflow: hidden; position: relative; height: 180px; }
        .card.selecionado { border: 3px solid var(--gold-solid); box-shadow: 0 0 15px var(--gold-solid); }
        .card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }

        .btn-modo-pix { background: var(--gold-18k); color: #000; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; }
        .btn-confirmar-pix { position: fixed; bottom: 20px; left: 5%; width: 90%; background: #00ff00; color: #000; padding: 22px; border: none; border-radius: 15px; font-weight: 900; font-size: 1.6rem; z-index: 1100; display: none; }

        /* ILUSÃO SUPREME */
        #supreme-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 20000; flex-direction: column; align-items: center; justify-content: center; }
        .gold-text { font-size: 12vw; font-weight: 900; background: var(--gold-18k); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
        .slide-anim { animation: slidePass 1s ease-in-out 2; }
        @keyframes slidePass { 0% { transform: translateX(-150%); } 50% { transform: translateX(0%); } 100% { transform: translateX(150%); } }
        #flash-img { max-width: 85%; border: 6px solid var(--gold-solid); display: none; }

        /* MODAL QR CODE */
        #modal-pix-final { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        #qr-box { background: #fff; padding: 15px; border-radius: 15px; margin: 20px 0; border: 5px solid var(--gold-solid); }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <div style="font-size: 10px; color: #fff;">SISTEMA JDP INDUSTRIAL</div>
            <button class="btn-modo-pix" onclick="ativarModoPagar()">PIX / PAGAR</button>
        </div>
        <div id="total-venda">R$ 0,00</div>
    </div>

    <div class="grid" id="cardapio-vitrine"></div>

    <button id="btn-gerar-qr" class="btn-confirmar-pix" onclick="processarPedidoCompleto()">GERAR QR CODE AGORA</button>

    <div id="supreme-overlay">
        <div id="ilusao-texto" class="gold-text">DONY BURGUERS</div>
        <img id="flash-img" src="">
    </div>

    <div id="modal-pix-final">
        <div style="color:var(--gold-solid); font-size: 1.5rem;">AGUARDANDO PAGAMENTO</div>
        <div id="valor-confirmado" style="font-size: 3.5rem; color: #fff; font-weight: 900;">R$ 0,00</div>
        <div id="qr-box"></div>
        <div style="color: #555; font-size: 0.8rem;">Diga "JÁ FOI PAGO" para finalizar</div>
    </div>

    <script>
        const PIX_BASE = "00020126500014br.gov.bcb.pix0128josedivinoprado649@gmail.com52040000";
        let modoPagar = false, contaAtual = [], produtosGlobal = [];

        const firebaseConfig = { apiKey: "AIzaSyCEdXF7ScnMYz0Ce0OW-B_UJ8Bm5Pl9m8o", databaseURL: "https://dony-burguers-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function iniciarVoz() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(Speech) {
                const rec = new Speech();
                rec.continuous = true; rec.lang = 'pt-BR';
                rec.onresult = (e) => {
                    const texto = e.results[e.results.length-1][0].transcript.toLowerCase();
                    if(texto.includes("já foi pago")) executarIlusaoFinal();
                };
                rec.start();
            }
        }
        document.body.onclick = () => iniciarVoz();

        function ativarModoPagar() {
            modoPagar = true;
            document.getElementById('btn-gerar-qr').style.display = 'block';
        }

        db.ref('cardapio_supreme').on('value', snap => {
            const dados = snap.val();
            produtosGlobal = dados ? Object.entries(dados).map(([id, v]) => ({id, ...v})) : [];
            document.getElementById('cardapio-vitrine').innerHTML = produtosGlobal.map(p => `
                <div class="card" id="card-${p.id}" onclick="selecionarItem('${p.id}', ${p.preco})">
                    <img src="${p.link}">
                </div>`).join('');
        });

        function selecionarItem(id, preco) {
            if(!modoPagar) return;
            const p = produtosGlobal.find(x => x.id === id);
            contaAtual.push(p);
            document.getElementById(`card-${id}`).classList.add('selecionado');
            const total = contaAtual.reduce((acc, i) => acc + parseFloat(i.preco), 0);
            document.getElementById('total-venda').innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
        }

        async function processarPedidoCompleto() {
            const total = contaAtual.reduce((acc, i) => acc + parseFloat(i.preco), 0);
            if(total <= 0) return;

            // 1. REGISTRA NO FIREBASE (O QUE ESTAVA FALTANDO)
            db.ref('PEDIDOS_PRODUCAO').push({
                itens: contaAtual,
                total: total.toFixed(2),
                data: new Date().toLocaleString(),
                status: "PAGO_AGUARDANDO"
            });

            // 2. BAIXA ESTOQUE
            for(let item of contaAtual) {
                db.ref('cardapio_supreme/' + item.id).update({ 
                    estoque: (item.estoque || 1) - 1 
                });
            }

            // 3. EXECUTA ANIMAÇÃO E MOSTRA QR
            await executarIlusaoPedido();
        }

        async function executarIlusaoPedido() {
            const overlay = document.getElementById('supreme-overlay');
            const texto = document.getElementById('ilusao-texto');
            const flash = document.getElementById('flash-img');

            overlay.style.display = 'flex';
            texto.innerText = "DONY BURGUERS";
            texto.style.display = 'block';
            texto.classList.add('slide-anim');
            
            await new Promise(r => setTimeout(r, 2000));
            
            texto.style.display = 'none';
            flash.style.display = 'block';
            for (let item of contaAtual) {
                flash.src = item.link;
                await new Promise(r => setTimeout(r, 250));
            }

            overlay.style.display = 'none';
            flash.style.display = 'none';
            abrirQR();
        }

        function abrirQR() {
            const total = contaAtual.reduce((acc, i) => acc + parseFloat(i.preco), 0);
            const valorTxt = total.toFixed(2);
            const tamValor = valorTxt.length.toString().padStart(2, '0');
            const pixDinamico = PIX_BASE + "530398654" + tamValor + valorTxt + "5802BR5925Jose Divino Prado Da Lapa6009Sao Paulo62070503***63041F98";

            document.getElementById('valor-confirmado').innerText = `R$ ${valorTxt.replace('.',',')}`;
            const qrBox = document.getElementById('qr-box');
            qrBox.innerHTML = "";
            new QRCode(qrBox, { text: pixDinamico, width: 260, height: 260 });
            document.getElementById('modal-pix-final').style.display = 'flex';
        }

        async function executarIlusaoFinal() {
            document.getElementById('modal-pix-final').style.display = 'none';
            const overlay = document.getElementById('supreme-overlay');
            const texto = document.getElementById('ilusao-texto');
            
            overlay.style.display = 'flex';
            texto.innerText = "OBRIGADO!";
            texto.style.display = 'block';
            texto.classList.remove('slide-anim');
            texto.style.animation = "pulse 1s infinite alternate";
            
            await new Promise(r => setTimeout(r, 4000));
            location.reload(); 
        }
    </script>
</body>
</html>
